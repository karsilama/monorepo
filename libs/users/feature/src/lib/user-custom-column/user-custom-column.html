<mat-list-item>
  <div matListItemAvatar>
    <img [src]="user().image ?? defaultAvatar" alt="avatar" />
  </div>
  <div matListItemTitle>{{ user().firstName }} {{ user().lastName }}</div>
  <div matListItemLine>
    CODE {{ user().address?.postalCode }}, - {{ user().address?.address }}, - {{
    user().address?.city }}, - {{ user().address?.country }}, {{
    user().address?.state }}, -
  </div>
</mat-list-item>
