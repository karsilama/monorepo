<mat-form-field appearance="outline" class="relative">
  <mat-label>{{ label() }}</mat-label>
  <input
    matInput
    placeholder="{{ placeholder() }}"
    type="text"
    [formField]="formField()"
  />
  @if (iconSuffix()) {
    <mat-icon matSuffix>{{ iconSuffix() }}</mat-icon>
  }
  <mat-hint>{{ hint() }}</mat-hint>

  @if (showClearField()) {
    <button
      matFab
      class="absolute right-0"
      aria-label="Clear text field"
      (click)="onClearField()"
    >
      <mat-icon>close</mat-icon>
    </button>
  }
</mat-form-field>
