@if (data()) {
  <div class="flex flex-col w-full h-full">
    <lab-form-search (executed)="onSearchChanges($event)"></lab-form-search>
    <div class="flex flex-1 h-full overflow-hidden">
      <lab-list
        [data]="filteredData()"
        (executed)="onExecuted($event)"
      ></lab-list>
    </div>
  </div>
}
