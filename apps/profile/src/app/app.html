<section class="flex h-full w-full p-5">
  <mat-card class="w-full h-full overflow-hidden" appearance="outlined">
    <mat-card-header>
      <mat-card-title>
        @if(showBackButton()) {
        <button mat-button routerLink="/">
          Back
          <mat-icon>chevron_left</mat-icon>
        </button>
        } {{title}}</mat-card-title
      >
    </mat-card-header>
    <mat-card-content class="flex flex-1 overflow-auto">
      <router-outlet></router-outlet>
    </mat-card-content>
    <mat-card-footer class="p-5 items-center flex justify-center gap-5">
      🙎‍♂️ Jesus Colavita 📪 jesus.ac@gmail.com 📍 08003, Barcelona
    </mat-card-footer>
  </mat-card>
</section>
