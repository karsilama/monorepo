<mat-card class="example-card" appearance="outlined">
  <mat-card-header>
    <div mat-card-avatar class="example-header-image"></div>
    <mat-card-title
      >{{ selectedUser()?.firstName }} -
      {{ selectedUser()?.lastName }}</mat-card-title
    >
    <mat-card-subtitle>
      {{ selectedUser()?.email }}
    </mat-card-subtitle>
  </mat-card-header>
  <img mat-card-image [src]="selectedUser()?.image" alt="User avatar" />
  <mat-card-content>
    <p>
      {{ selectedUser()?.company }} -
      {{ selectedUser()?.address }}
    </p>
  </mat-card-content>
  <mat-card-actions>
    <button matButton aria-label="Cancel edition">Cancel</button>
    <button matButton color="primary" aria-label="Save user information">
      Save
    </button>
  </mat-card-actions>
</mat-card>
