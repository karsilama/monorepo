<mat-card class="example-card" appearance="outlined">
  <mat-card-header>
    <div mat-card-avatar class="example-header-image"></div>
    <mat-card-title
      >{{ selectedUser()?.firstName }} -
      {{ selectedUser()?.lastName }}</mat-card-title
    >
    <mat-card-subtitle>
      {{ selectedUser()?.email }}
    </mat-card-subtitle>
  </mat-card-header>
  <img mat-card-image [src]="selectedUser()?.image" alt="User avatar" />
  <mat-card-content>
    <p>
      {{ selectedUser()?.company?.name }} -
      {{ selectedUser()?.address?.postalCode }},
      {{ selectedUser()?.address?.address }},
      {{ selectedUser()?.address?.state }}
    </p>
  </mat-card-content>
  <mat-card-actions>
    <div class="w-full flex items-center justify-end gap-4">
      <button matButton aria-label="Cancel edition" (click)="navigateUsers()">
        Cancel
      </button>
      <button matButton color="primary" aria-label="Save user information">
        Save
      </button>
    </div>
  </mat-card-actions>
</mat-card>
